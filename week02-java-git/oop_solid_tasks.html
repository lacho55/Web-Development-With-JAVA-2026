// ── Safe highlighter: works on plain text, outputs HTML ──
function highlight(raw) {
  let s = raw
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  const strTokens = [];
  s = s.replace(/"([^"\\]|\\.)*"/g, m => {
    const idx = strTokens.length;
    strTokens.push('<span class="str">' + m + '</span>');
    return '\x00STR' + idx + '\x00';
  });
  s = s.replace(/'[^'\\]'/g, m => {
    const idx = strTokens.length;
    strTokens.push('<span class="str">' + m + '</span>');
    return '\x00STR' + idx + '\x00';
  });

  const cmtTokens = [];
  s = s.replace(/\/\*[\s\S]*?\*\//g, m => {
    const idx = cmtTokens.length;
    cmtTokens.push('<span class="cmt">' + m + '</span>');
    return '\x00CMT' + idx + '\x00';
  });
  s = s.replace(/\/\/[^\n]*/g, m => {
    const idx = cmtTokens.length;
    cmtTokens.push('<span class="cmt">' + m + '</span>');
    return '\x00CMT' + idx + '\x00';
  });

  const kws = ['public','private','protected','static','void','class','record',
    'return','new','if','else','for','while','do','switch','case','break',
    'continue','int','double','float','long','short','byte','char','boolean',
    'import','package','final','abstract','interface','extends','implements',
    'try','catch','throws','throw','default','this','super','null','true',
    'false','instanceof','var','sealed','permits','yield','enum','@Override'];
  s = s.replace(new RegExp('(?<![\\w])(' + kws.join('|').replace('@','\\@') + ')(?![\\w])', 'g'),
    '\x00KW$1\x00');
  s = s.replace(/\x00KW(.+?)\x00/g, '<span class="kw">$1</span>');

  const types = ['String','Integer','Double','Boolean','Long','Float','Character',
    'Byte','Short','Object','System','Math','Scanner','StringBuilder','StringBuffer',
    'Arrays','List','ArrayList','Map','HashMap','Set','HashSet','Optional',
    'Stream','Collectors','Pattern','Matcher','Thread','Runnable','Comparable',
    'Iterable','Collections','Consumer','Function','Predicate','Supplier',
    'BiFunction','UnaryOperator','BinaryOperator','Comparator','Iterator'];
  s = s.replace(new RegExp('(?<![\\w])(' + types.join('|') + ')(?![\\w])', 'g'),
    '\x00TYP$1\x00');
  s = s.replace(/\x00TYP(\w+)\x00/g, '<span class="typ">$1</span>');

  s = s.replace(/(?<!\w)(\d+\.?\d*[fFLlDd]?)(?!\w)/g, '<span class="num">$1</span>');
  s = s.replace(/\b([a-z][a-zA-Z0-9_]*)(?=\s*\()/g, '<span class="mth">$1</span>');

  cmtTokens.forEach((val, i) => { s = s.replace('\x00CMT' + i + '\x00', val); });
  strTokens.forEach((val, i)  => { s = s.replace('\x00STR'  + i + '\x00', val); });

  return s;
}

"id": 1,
"section": "OOP Fundamentals",
"title": "Classes & Objects",
"desc": "Create a <code>Car</code> class with fields for brand, model, and year. Add a constructor and a method that prints car info. Instantiate two different cars.",
"code": "public class Car {\n    String brand;\n    String model;\n    int year;\n\n    Car(String brand, String model, int year) {\n        this.brand = brand;\n        this.model = model;\n        this.year = year;\n    }\n\n    void displayInfo() {\n        System.out.println(year + \" \" + brand + \" \" + model);\n    }\n\n    public static void main(String[] args) {\n        Car car1 = new Car(\"Toyota\", \"Camry\", 2022);\n        Car car2 = new Car(\"Honda\", \"Civic\", 2023);\n\n        car1.displayInfo();\n        car2.displayInfo();\n\n        System.out.println(\"Same object? \" + (car1 == car2)); // false\n    }\n}",
"output": "2022 Toyota Camry\n2023 Honda Civic\nSame object? false",
"points": [
"A class is a blueprint; an object is an instance created with <code>new</code>.",
"<code>this</code> refers to the current object — resolves name conflicts between parameters and fields.",
"Each object has its own copy of instance fields stored on the heap."
]
},
{
"id": 2,
"title": "Encapsulation",
"desc": "Refactor a <code>BankAccount</code> class so that the balance is private and can only be modified through <code>deposit()</code> and <code>withdraw()</code> methods with validation.",
"badCode": "public class BankAccount {\n    public double balance = 0; // anyone can set to -9999!\n}",
"code": "public class BankAccount {\n    private double balance;\n    private final String owner;\n\n    public BankAccount(String owner, double initialDeposit) {\n        this.owner = owner;\n        this.balance = Math.max(0, initialDeposit);\n    }\n\n    public double getBalance() { return balance; }\n    public String getOwner()   { return owner; }\n\n    public void deposit(double amount) {\n        if (amount <= 0) throw new IllegalArgumentException(\"Deposit must be positive\");\n        balance += amount;\n        System.out.printf(\"Deposited $%.2f. Balance: $%.2f%n\", amount, balance);\n    }\n\n    public boolean withdraw(double amount) {\n        if (amount <= 0 || amount > balance) {\n            System.out.println(\"Withdrawal denied.\");\n            return false;\n        }\n        balance -= amount;\n        System.out.printf(\"Withdrew $%.2f. Balance: $%.2f%n\", amount, balance);\n        return true;\n    }\n\n    public static void main(String[] args) {\n        BankAccount acc = new BankAccount(\"Alice\", 1000);\n        acc.deposit(500);\n        acc.withdraw(200);\n        acc.withdraw(5000); // denied\n        System.out.println(\"Final: $\" + acc.getBalance());\n    }\n}",
"output": "Deposited $500.00. Balance: $1500.00\nWithdrew $200.00. Balance: $1300.00\nWithdrawal denied.\nFinal: $1300.0",

"Encapsulation = private fields + public getters/setters with validation.",
"Prevents invalid state — balance can never go negative.",
"<code>final</code> fields (like owner) make objects partially immutable."

},
{
"id": 3,
"title": "Constructors & this",
"desc": "Create a <code>Student</code> class with multiple constructors using constructor chaining (<code>this(...)</code>). Show how one constructor delegates to another.",
"code": "public class Student {\n    private String name;\n    private int age;\n    private String major;\n\n    // Primary constructor\n    Student(String name, int age, String major) {\n        this.name = name;\n        this.age = age;\n        this.major = major;\n    }\n\n    // Chains to primary — default major\n    Student(String name, int age) {\n        this(name, age, \"Undeclared\");\n    }\n\n    // Chains to 2-arg — default age\n    Student(String name) {\n        this(name, 18);\n    }\n\n    void display() {\n        System.out.printf(\"%s, age %d, major: %s%n\", name, age, major);\n    }\n\n    public static void main(String[] args) {\n        new Student(\"Alice\", 21, \"CS\").display();\n        new Student(\"Bob\", 20).display();\n        new Student(\"Carol\").display();\n    }\n}",
"output": "Alice, age 21, major: CS\nBob, age 20, major: Undeclared\nCarol, age 18, major: Undeclared",
"points": [
"<code>this(...)</code> must be the first statement in a constructor.",

"id": 4,

{

"desc": "Create an <code>Animal</code> base class with a <code>speak()</code> method. Derive <code>Dog</code> and <code>Cat</code> subclasses that override <code>speak()</code>. Demonstrate <code>super</code> usage.",
"code": "public class Animal {\n    protected String name;\n\n    Animal(String name) {\n        this.name = name;\n        System.out.println(\"Animal constructor: \" + name);\n    }\n\n    void speak() {\n        System.out.println(name + \" makes a sound.\");\n    }\n\n    void info() {\n        System.out.println(\"I am \" + name + \" (\" + getClass().getSimpleName() + \")\");\n    }\n}\n\nclass Dog extends Animal {\n    Dog(String name) {\n        super(name); // must call parent constructor first\n    }\n\n    @Override\n    void speak() {\n        System.out.println(name + \" says: Woof!\");\n    }\n}\n\nclass Cat extends Animal {\n    Cat(String name) {\n        super(name);\n    }\n\n    @Override\n    void speak() {\n        System.out.println(name + \" says: Meow!\");\n    }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        Animal dog = new Dog(\"Rex\");\n        Animal cat = new Cat(\"Whiskers\");\n\n        dog.speak();\n        cat.speak();\n        dog.info();\n        cat.info();\n    }\n}",

"id": 6,
"title": "Polymorphism",

"code": "abstract class Shape {\n    abstract double area();\n    abstract String name();\n\n    void printArea() {\n        System.out.printf(\"%s: area = %.2f%n\", name(), area());\n    }\n}\n\nclass Circle extends Shape {\n    private double radius;\n    Circle(double radius) { this.radius = radius; }\n\n    @Override double area() { return Math.PI * radius * radius; }\n    @Override String name() { return \"Circle(r=\" + radius + \")\"; }\n}\n\nclass Rectangle extends Shape {\n    private double w, h;\n    Rectangle(double w, double h) { this.w = w; this.h = h; }\n\n    @Override double area() { return w * h; }\n    @Override String name() { return \"Rect(\" + w + \"x\" + h + \")\"; }\n}\n\nclass Triangle extends Shape {\n    private double base, height;\n    Triangle(double base, double height) { this.base = base; this.height = height; }\n\n    @Override double area() { return 0.5 * base * height; }\n    @Override String name() { return \"Tri(b=\" + base + \",h=\" + height + \")\"; }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        Shape[] shapes = {\n            new Circle(5),\n            new Rectangle(4, 6),\n            new Triangle(3, 8),\n            new Circle(2.5)\n        };\n\n        for (Shape s : shapes) {\n            s.printArea(); // polymorphic dispatch\n        }\n    }\n}",

"desc": "Override <code>toString()</code>, <code>equals()</code>, and <code>hashCode()</code> for a <code>Point</code> class. Show why all three should be consistent.",
"code": "import java.util.Objects;\nimport java.util.HashSet;\n\npublic class Point {\n    private final int x;\n    private final int y;\n\n    Point(int x, int y) { this.x = x; this.y = y; }\n\n    @Override\n    public String toString() {\n        return \"(\" + x + \", \" + y + \")\";\n    }\n\n    @Override\n    public boolean equals(Object o) {\n        if (this == o) return true;\n        if (!(o instanceof Point p)) return false;\n        return x == p.x && y == p.y;\n    }\n\n    @Override\n    public int hashCode() {\n        return Objects.hash(x, y);\n    }\n\n    public static void main(String[] args) {\n        Point a = new Point(3, 4);\n        Point b = new Point(3, 4);\n        Point c = new Point(1, 2);\n\n        System.out.println(\"a = \" + a);\n        System.out.println(\"a.equals(b): \" + a.equals(b));\n        System.out.println(\"a.equals(c): \" + a.equals(c));\n        System.out.println(\"a == b     : \" + (a == b)); // false — different objects\n\n        // HashSet uses hashCode + equals\n        HashSet<Point> set = new HashSet<>();\n        set.add(a);\n        set.add(b); // duplicate — not added\n        set.add(c);\n        System.out.println(\"Set size: \" + set.size()); // 2\n    }\n}",

"points": [

"Contract: equal objects must have the same hash code.",
"<code>Objects.hash()</code> is a convenient helper for computing hash codes.",
"<code>instanceof</code> pattern matching (Java 16+) casts and checks in one step."

"code": "class Main {\n    sealed interface Notification permits Email, SMS, Push {}\n    record Email(String from, String subject) implements Notification {}\n    record SMS(String phone, String message) implements Notification {}\n    record Push(String app, String title) implements Notification {}\n\n    static void handle(Notification n) {\n        // Pattern matching — no explicit cast needed\n        if (n instanceof Email e) {\n            System.out.println(\"Email from \" + e.from() + \": \" + e.subject());\n        } else if (n instanceof SMS s) {\n            System.out.println(\"SMS from \" + s.phone() + \": \" + s.message());\n        } else if (n instanceof Push p) {\n            System.out.println(\"Push [\" + p.app() + \"]: \" + p.title());\n        }\n    }\n\n    // Even cleaner with switch (Java 21+)\n    static String summarize(Notification n) {\n        return switch (n) {\n            case Email e -> \"📧 \" + e.subject();\n            case SMS s   -> \"💬 \" + s.message();\n            case Push p  -> \"🔔 \" + p.title();\n        };\n    }\n\n    public static void main(String[] args) {\n        Notification[] inbox = {\n            new Email(\"alice@mail.com\", \"Meeting at 3pm\"),\n            new SMS(\"+359888123456\", \"On my way!\"),\n            new Push(\"Slack\", \"New message in #general\")\n        };\n\n        for (Notification n : inbox) handle(n);\n        System.out.println();\n        for (Notification n : inbox) System.out.println(summarize(n));\n    }\n}",

"id": 17,
"title": "Comparable & Comparator",
"desc": "Make a <code>Product</code> class sortable by implementing <code>Comparable</code>, then sort by different fields using <code>Comparator</code>.",
"code": "import java.util.*;\n\nclass Product implements Comparable<Product> {\n    String name;\n    double price;\n    int rating;\n\n    Product(String name, double price, int rating) {\n        this.name = name;\n        this.price = price;\n        this.rating = rating;\n    }\n\n    // Natural ordering: by price ascending\n    @Override\n    public int compareTo(Product other) {\n        return Double.compare(this.price, other.price);\n    }\n\n    @Override\n    public String toString() {\n        return String.format(\"%-10s $%.2f ★%d\", name, price, rating);\n    }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        List<Product> products = new ArrayList<>(List.of(\n            new Product(\"Mouse\",    25.99, 4),\n            new Product(\"Keyboard\", 79.99, 5),\n            new Product(\"Monitor\",  299.99, 4),\n            new Product(\"Headset\",  59.99, 3)\n        ));\n\n        // Natural order (Comparable — by price)\n        Collections.sort(products);\n        System.out.println(\"By price:\");\n        products.forEach(System.out::println);\n\n        // Custom Comparator — by rating desc, then name\n        products.sort(Comparator.comparingInt(Product::rating).reversed()\n                                .thenComparing(Product::name));\n        System.out.println(\"\\nBy rating desc:\");\n        products.forEach(System.out::println);\n    }\n}",
"output": "By price:\nMouse      $25.99 ★4\nHeadset    $59.99 ★3\nKeyboard   $79.99 ★5\nMonitor    $299.99 ★4\n\nBy rating desc:\nKeyboard   $79.99 ★5\nMonitor    $299.99 ★4\nMouse      $25.99 ★4\nHeadset    $59.99 ★3",
"points": [
"<code>Comparable</code> defines the natural ordering inside the class itself.",
"<code>Comparator</code> allows external, multiple, and composable sort strategies.",
"<code>Comparator.comparing(...).thenComparing(...)</code> chains sort criteria cleanly."
]

"title": "Object Cloning",
"desc": "Implement <code>Cloneable</code> to create shallow and deep copies of an object. Show the pitfall of shallow copying mutable fields.",
"code": "import java.util.Arrays;\n\nclass Address implements Cloneable {\n    String city;\n    Address(String city) { this.city = city; }\n\n    @Override\n    protected Address clone() throws CloneNotSupportedException {\n        return (Address) super.clone();\n    }\n    @Override public String toString() { return city; }\n}\n\nclass Person implements Cloneable {\n    String name;\n    Address address; // mutable reference!\n\n    Person(String name, Address address) {\n        this.name = name;\n        this.address = address;\n    }\n\n    // Deep clone — clone mutable fields too\n    @Override\n    protected Person clone() throws CloneNotSupportedException {\n        Person copy = (Person) super.clone();\n        copy.address = this.address.clone(); // deep copy!\n        return copy;\n    }\n\n    @Override\n    public String toString() { return name + \" from \" + address; }\n}\n\nclass Main {\n    public static void main(String[] args) throws CloneNotSupportedException {\n        Person original = new Person(\"Alice\", new Address(\"Sofia\"));\n        Person copy = original.clone();\n\n        System.out.println(\"Original: \" + original);\n        System.out.println(\"Copy    : \" + copy);\n\n        copy.address.city = \"Plovdiv\";\n        System.out.println(\"\\nAfter changing copy's city:\");\n        System.out.println(\"Original: \" + original); // still Sofia (deep copy!)\n        System.out.println(\"Copy    : \" + copy);\n    }\n}",
"output": "Original: Alice from Sofia\nCopy    : Alice from Sofia\n\nAfter changing copy's city:\nOriginal: Alice from Sofia\nCopy    : Alice from Plovdiv",
"points": [
"Shallow clone copies references — both objects share mutable fields.",
"Deep clone also clones referenced mutable objects for full independence.",
"Modern alternative: use copy constructors or <code>record</code> with immutable fields."
]

"title": "Exception Hierarchy & Custom Exceptions",
"desc": "Create a custom checked and unchecked exception. Use them in a service method with proper exception handling.",
"code": "// Custom checked exception\nclass InsufficientFundsException extends Exception {\n    private final double deficit;\n\n    InsufficientFundsException(double deficit) {\n        super(String.format(\"Insufficient funds. Need $%.2f more.\", deficit));\n        this.deficit = deficit;\n    }\n\n    double getDeficit() { return deficit; }\n}\n\n// Custom unchecked exception\nclass InvalidAccountException extends RuntimeException {\n    InvalidAccountException(String id) {\n        super(\"No account found: \" + id);\n    }\n}\n\nclass WalletService {\n    private double balance;\n\n    WalletService(double balance) {\n        this.balance = balance;\n    }\n\n    void withdraw(double amount) throws InsufficientFundsException {\n        if (amount <= 0) throw new IllegalArgumentException(\"Amount must be positive\");\n        if (amount > balance) throw new InsufficientFundsException(amount - balance);\n        balance -= amount;\n        System.out.printf(\"Withdrew $%.2f. Remaining: $%.2f%n\", amount, balance);\n    }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        WalletService wallet = new WalletService(100);\n\n        try {\n            wallet.withdraw(30);\n            wallet.withdraw(200); // will throw\n        } catch (InsufficientFundsException e) {\n            System.out.println(\"Caught: \" + e.getMessage());\n            System.out.printf(\"Deficit: $%.2f%n\", e.getDeficit());\n        } finally {\n            System.out.println(\"Transaction complete.\");\n        }\n    }\n}",
"output": "Withdrew $30.00. Remaining: $70.00\nCaught: Insufficient funds. Need $130.00 more.\nDeficit: $130.00\nTransaction complete.",
"points": [
"Checked exceptions (<code>extends Exception</code>) must be caught or declared with <code>throws</code>.",
"Unchecked exceptions (<code>extends RuntimeException</code>) don't require explicit handling.",
"Custom exceptions can carry extra data (like <code>deficit</code>) for richer error handling."
]

"badCode": "class Rectangle {\n    int w, h;\n    void setWidth(int w) { this.w = w; }\n    void setHeight(int h) { this.h = h; }\n    int area() { return w * h; }\n}\nclass Square extends Rectangle {\n    void setWidth(int w) { this.w = w; this.h = w; } // BREAKS expectations!\n    void setHeight(int h) { this.w = h; this.h = h; }\n}\n// resize(rect, 5, 10) — if rect is a Square, area is 100, not 50!",
"code": "// CORRECT: Use a common interface instead of broken inheritance\n\nsealed interface Shape permits Rectangle, Square, Circle {\n    double area();\n    String describe();\n}\n\nrecord Rectangle(double width, double height) implements Shape {\n    public double area() { return width * height; }\n    public String describe() { return \"Rect(\" + width + \"x\" + height + \")\"; }\n}\n\nrecord Square(double side) implements Shape {\n    public double area() { return side * side; }\n    public String describe() { return \"Square(\" + side + \")\"; }\n}\n\nrecord Circle(double radius) implements Shape {\n    public double area() { return Math.PI * radius * radius; }\n    public String describe() { return \"Circle(r=\" + radius + \")\"; }\n}\n\nclass AreaCalculator {\n    // Works correctly for ANY Shape — no surprises\n    static void printArea(Shape s) {\n        System.out.printf(\"%s → area = %.2f%n\", s.describe(), s.area());\n    }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        Shape[] shapes = {\n            new Rectangle(5, 10),\n            new Square(7),\n            new Circle(3)\n        };\n\n        for (Shape s : shapes) {\n            AreaCalculator.printArea(s);\n        }\n    }\n}",

"code": "import java.util.*;\n\n// --- ISP: small, focused interfaces ---\ninterface LogFormatter {\n    String format(String level, String message);\n}\n\ninterface LogDestination {\n    void write(String formattedMessage);\n}\n\n// --- OCP: new formatters/destinations without modifying Logger ---\nclass SimpleFormatter implements LogFormatter {\n    public String format(String level, String message) {\n        return \"[\" + level + \"] \" + message;\n    }\n}\n\nclass ConsoleDestination implements LogDestination {\n    public void write(String msg) { System.out.println(msg); }\n}\n\nclass FileDestination implements LogDestination {\n    private final String filename;\n    FileDestination(String filename) { this.filename = filename; }\n    public void write(String msg) {\n        System.out.println(\"(→ \" + filename + \") \" + msg);\n    }\n}\n\n// --- SRP: Logger only orchestrates; doesn't format or write ---\n// --- DIP: depends on abstractions (interfaces), not concrete classes ---\nclass Logger {\n    private final LogFormatter formatter;\n    private final List<LogDestination> destinations;\n    private final Set<String> enabledLevels;\n\n    Logger(LogFormatter formatter, List<LogDestination> destinations, Set<String> levels) {\n        this.formatter = formatter;\n        this.destinations = destinations;\n        this.enabledLevels = levels;\n    }\n\n    void log(String level, String message) {\n        if (!enabledLevels.contains(level)) return;\n        String formatted = formatter.format(level, message);\n        for (LogDestination dest : destinations) dest.write(formatted);\n    }\n\n    void info(String msg)  { log(\"INFO\", msg); }\n    void warn(String msg)  { log(\"WARN\", msg); }\n    void error(String msg) { log(\"ERROR\", msg); }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        Logger logger = new Logger(\n            new SimpleFormatter(),\n            List.of(new ConsoleDestination(), new FileDestination(\"app.log\")),\n            Set.of(\"INFO\", \"WARN\", \"ERROR\")\n        );\n\n        logger.info(\"Application started\");\n        logger.warn(\"Memory usage high\");\n        logger.error(\"Connection lost\");\n    }\n}",

"code": "import java.util.*;\n\n// ISP: separate interfaces for each capability\ninterface PaymentProcessor {\n    boolean processPayment(double amount);\n    String methodName();\n}\n\ninterface PaymentValidator {\n    boolean validate(double amount);\n}\n\ninterface ReceiptGenerator {\n    void generateReceipt(String method, double amount, boolean success);\n}\n\n// OCP: new payment methods = new classes\nclass CreditCardProcessor implements PaymentProcessor {\n    public boolean processPayment(double amount) {\n        System.out.printf(\"  Charging credit card $%.2f...%n\", amount);\n        return true;\n    }\n    public String methodName() { return \"Credit Card\"; }\n}\n\nclass PayPalProcessor implements PaymentProcessor {\n    public boolean processPayment(double amount) {\n        System.out.printf(\"  Processing PayPal $%.2f...%n\", amount);\n        return true;\n    }\n    public String methodName() { return \"PayPal\"; }\n}\n\nclass CryptoProcessor implements PaymentProcessor {\n    public boolean processPayment(double amount) {\n        System.out.printf(\"  Sending crypto equivalent of $%.2f...%n\", amount);\n        return amount < 10000; // limit\n    }\n    public String methodName() { return \"Crypto\"; }\n}\n\n// SRP: validator only validates\nclass AmountValidator implements PaymentValidator {\n    public boolean validate(double amount) {\n        return amount > 0 && amount <= 50000;\n    }\n}\n\n// SRP: receipt only generates output\nclass ConsoleReceipt implements ReceiptGenerator {\n    public void generateReceipt(String method, double amount, boolean success) {\n        String status = success ? \"SUCCESS\" : \"FAILED\";\n        System.out.printf(\"  Receipt: %s via %s — %s%n%n\", \n            String.format(\"$%.2f\", amount), method, status);\n    }\n}\n\n// DIP: depends on abstractions\nclass PaymentService {\n    private final PaymentValidator validator;\n    private final ReceiptGenerator receipt;\n\n    PaymentService(PaymentValidator validator, ReceiptGenerator receipt) {\n        this.validator = validator;\n        this.receipt = receipt;\n    }\n\n    void pay(double amount, PaymentProcessor processor) {\n        System.out.println(\"Processing \" + processor.methodName() + \":\");\n        if (!validator.validate(amount)) {\n            System.out.println(\"  Invalid amount!\");\n            receipt.generateReceipt(processor.methodName(), amount, false);\n            return;\n        }\n        boolean ok = processor.processPayment(amount);\n        receipt.generateReceipt(processor.methodName(), amount, ok);\n    }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        PaymentService service = new PaymentService(\n            new AmountValidator(), new ConsoleReceipt()\n        );\n\n        service.pay(49.99, new CreditCardProcessor());\n        service.pay(150.00, new PayPalProcessor());\n        service.pay(15000, new CryptoProcessor());\n    }\n}",

"id": 28,
"title": "Design Pattern — Strategy",
"desc": "Implement the Strategy pattern to allow switching sorting algorithms at runtime. Show how it naturally emerges from OCP and DIP.",
"code": "import java.util.*;\n\n// Strategy interface\ninterface SortStrategy {\n    void sort(int[] array);\n    String name();\n}\n\nclass BubbleSort implements SortStrategy {\n    public void sort(int[] a) {\n        for (int i = 0; i < a.length - 1; i++)\n            for (int j = 0; j < a.length - i - 1; j++)\n                if (a[j] > a[j+1]) { int t = a[j]; a[j] = a[j+1]; a[j+1] = t; }\n    }\n    public String name() { return \"Bubble Sort\"; }\n}\n\nclass SelectionSort implements SortStrategy {\n    public void sort(int[] a) {\n        for (int i = 0; i < a.length - 1; i++) {\n            int min = i;\n            for (int j = i+1; j < a.length; j++) if (a[j] < a[min]) min = j;\n            int t = a[min]; a[min] = a[i]; a[i] = t;\n        }\n    }\n    public String name() { return \"Selection Sort\"; }\n}\n\n// Context class — delegates to the strategy\nclass Sorter {\n    private SortStrategy strategy;\n\n    Sorter(SortStrategy strategy) { this.strategy = strategy; }\n\n    void setStrategy(SortStrategy strategy) { this.strategy = strategy; }\n\n    void sortAndPrint(int[] data) {\n        int[] copy = data.clone();\n        strategy.sort(copy);\n        System.out.println(strategy.name() + \": \" + Arrays.toString(copy));\n    }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        int[] data = {64, 25, 12, 22, 11};\n        System.out.println(\"Original: \" + Arrays.toString(data));\n\n        Sorter sorter = new Sorter(new BubbleSort());\n        sorter.sortAndPrint(data);\n\n        sorter.setStrategy(new SelectionSort()); // swap at runtime!\n        sorter.sortAndPrint(data);\n    }\n}",
"output": "Original: [64, 25, 12, 22, 11]\nBubble Sort: [11, 12, 22, 25, 64]\nSelection Sort: [11, 12, 22, 25, 64]",
"points": [
"Strategy pattern encapsulates algorithms and makes them interchangeable.",
"Follows OCP: new algorithms = new classes, no modification to <code>Sorter</code>.",
"Follows DIP: <code>Sorter</code> depends on <code>SortStrategy</code> abstraction."
]
},

"desc": "Implement the Observer pattern: a <code>Store</code> notifies registered customers when a product's price drops.",
"code": "import java.util.*;\n\n// Observer interface\ninterface PriceObserver {\n    void onPriceChange(String product, double oldPrice, double newPrice);\n}\n\n// Subject\nclass Store {\n    private final Map<String, Double> prices = new HashMap<>();\n    private final List<PriceObserver> observers = new ArrayList<>();\n\n    void addObserver(PriceObserver o)    { observers.add(o); }\n    void removeObserver(PriceObserver o) { observers.remove(o); }\n\n    void setPrice(String product, double price) {\n        double oldPrice = prices.getOrDefault(product, 0.0);\n        prices.put(product, price);\n        if (price < oldPrice) { // notify only on price drop\n            for (PriceObserver o : observers)\n                o.onPriceChange(product, oldPrice, price);\n        }\n    }\n}\n\n// Concrete observers\nclass Customer implements PriceObserver {\n    private final String name;\n    Customer(String name) { this.name = name; }\n\n    @Override\n    public void onPriceChange(String product, double oldPrice, double newPrice) {\n        System.out.printf(\"  %s notified: %s dropped $%.2f → $%.2f!%n\",\n            name, product, oldPrice, newPrice);\n    }\n}\n\nclass Main {\n    public static void main(String[] args) {\n        Store store = new Store();\n        Customer alice = new Customer(\"Alice\");\n        Customer bob   = new Customer(\"Bob\");\n\n        store.addObserver(alice);\n        store.addObserver(bob);\n\n        store.setPrice(\"Laptop\", 999.99);\n        System.out.println(\"Price set to $999.99 — no notification (first price)\");\n\n        store.setPrice(\"Laptop\", 1099.99);\n        System.out.println(\"Price raised — no notification\");\n\n        System.out.println(\"Price dropped:\");\n        store.setPrice(\"Laptop\", 849.99); // triggers notification\n    }\n}",
"output": "Price set to $999.99 — no notification (first price)\nPrice raised — no notification\nPrice dropped:\n  Alice notified: Laptop dropped $1099.99 → $849.99!\n  Bob notified: Laptop dropped $1099.99 → $849.99!",

  html += '<pre class="code-block">' + highlight(t.code) + '</pre></div>';

  if (t.output) {
    html += '<div class="output-block"><div class="output-label">Output</div><pre>' + t.output + '</pre></div>';
  }

  // Key points or table
  if (t.points) {
    html += '<div class="key-points"><div class="key-points-title">Key Points</div>';
    t.points.forEach(p => { html += '<div class="key-point">' + p + '</div>'; });
    html += '</div>';
  }
  if (t.table) {
    html += '<div class="key-points"><div class="key-points-title">Comparison</div><table class="kp-table"><tr>';
    t.table.headers.forEach(h => { html += '<th>' + h + '</th>'; });
    html += '</tr>';
    t.table.rows.forEach(r => { html += '<tr>'; r.forEach(c => { html += '<td>' + c + '</td>'; }); html += '</tr>'; });
    html += '</table></div>';
  }

  html += '</div></div>';
  tasksEl.innerHTML += html;
});

// ── Copy ──
function copyCode(btn) {
  const pre = btn.closest('.code-wrap').querySelector('.code-block');
  const text = pre.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}
</script>
