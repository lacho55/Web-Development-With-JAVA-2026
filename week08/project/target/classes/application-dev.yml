server:
  port: 9090
spring:
  config:
    activate:
      on-profile: dev
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma4
          temperature: 0.7
    # To use OpenAI instead: swap the starter in pom.xml and uncomment below:
    # openai:
    #   api-key: ${OPENAI_API_KEY}
    #   chat:
    #     options:
    #       model: gpt-4o-mini
    #       temperature: 0.7

theatre:
  log-level: DEBUG
  log-file: logs/theatre-dev.log

logging:
  level:
    root: INFO
    bg.uni.fmi.theatre: DEBUG
